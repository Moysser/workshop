<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <main class="contact">
      <h1>Contact us</h1>

      <form>
        <form-group>
          <label for="fname">First name:</label>
          <input type="text" id="fname" required />
        </form-group>
        <br />

        <label for="email">Email:</label>
        <input type="email" id="email" required />
      </form>
    </main>
  </body>
</html>
